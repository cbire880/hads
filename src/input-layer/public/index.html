<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>HADS Video + Vital Camp Upload</title>
    <style>
      body {
        font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        margin: 0;
        background: #111827;
        color: #f9fafb;
      }
      main {
        max-width: 880px;
        margin: 0 auto;
        padding: 48px 20px;
      }
      .card {
        background: #1f2937;
        border: 1px solid #374151;
        border-radius: 16px;
        padding: 24px;
        box-shadow: 0 18px 45px rgb(0 0 0 / 0.25);
      }
      label,
      button {
        display: block;
        margin-top: 16px;
      }
      input[type="file"] {
        width: 100%;
        padding: 18px;
        border: 2px dashed #6b7280;
        border-radius: 12px;
        background: #111827;
        color: #f9fafb;
      }
      button {
        cursor: pointer;
        border: 0;
        border-radius: 10px;
        padding: 12px 18px;
        background: #38bdf8;
        color: #082f49;
        font-weight: 700;
      }
      progress {
        width: 100%;
        height: 24px;
        margin-top: 16px;
      }
      pre {
        white-space: pre-wrap;
        background: #030712;
        border-radius: 12px;
        padding: 16px;
        overflow: auto;
      }
      .muted {
        color: #cbd5e1;
      }
    </style>
  </head>
  <body>
    <main>
      <h1>HADS Video + Vital Camp Upload</h1>
      <p class="muted">
        Upload MP4, MOV, AVI walkthroughs or Vital Camp exports (.glb, .obj, .svg, .dxf).
        The MVP pipeline stores the files, extracts a deterministic floor-plan preview, and returns baseline device placement recommendations.
      </p>

      <section class="card">
        <form id="upload-form">
          <label for="files">Walkthrough video or Vital Camp export files</label>
          <input id="files" name="files" type="file" multiple accept=".mp4,.mov,.avi,.glb,.obj,.svg,.dxf" />
          <button type="submit">Upload and process</button>
        </form>
        <progress id="progress" value="0" max="100"></progress>
        <p id="status" class="muted">Waiting for upload.</p>
        <pre id="result"></pre>
      </section>
    </main>

    <script>
      const form = document.querySelector("#upload-form");
      const filesInput = document.querySelector("#files");
      const progress = document.querySelector("#progress");
      const status = document.querySelector("#status");
      const result = document.querySelector("#result");

      async function pollJob(jobId) {
        const response = await fetch(`/api/jobs/${jobId}`);
        const job = await response.json();
        progress.value = job.progress ?? 0;
        status.textContent = `Job ${job.id}: ${job.status} (${job.progress}%)`;
        result.textContent = JSON.stringify(job, null, 2);

        if (!["complete", "failed"].includes(job.status)) {
          setTimeout(() => pollJob(jobId), 1000);
        }
      }

      form.addEventListener("submit", async (event) => {
        event.preventDefault();
        result.textContent = "";
        progress.value = 5;
        status.textContent = "Uploading...";

        const data = new FormData();
        for (const file of filesInput.files) {
          data.append("files", file);
        }

        const response = await fetch("/api/upload-video", {
          method: "POST",
          body: data,
        });
        const payload = await response.json();

        if (!response.ok) {
          progress.value = 0;
          status.textContent = payload.error ?? "Upload failed.";
          return;
        }

        await pollJob(payload.id);
      });
    </script>
  </body>
</html>
